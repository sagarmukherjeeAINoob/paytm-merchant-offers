<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paytm Brand Offers Portal</title>
<style>
  :root {
    --primary: #00BAF2;
    --primary-dark: #0099CC;
    --bg: #F4F6F9;
    --card-bg: #FFFFFF;
    --text: #1A1A2E;
    --muted: #6B7280;
    --border: #E5E7EB;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* Header */
  .header {
    background: linear-gradient(135deg, #001F5C 0%, #003DA5 60%, #00BAF2 100%);
    padding: 24px 32px;
    display: flex; align-items: center; gap: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .header-logo { height: 48px; filter: brightness(0) invert(1); }
  .header h1 { color: white; font-size: 22px; font-weight: 700; line-height: 1.2; }
  .header p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 2px; }
  
  /* Main layout */
  .container { max-width: 1400px; margin: 0 auto; padding: 32px 20px; }
  
  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 28px; }
  .tab { padding: 10px 24px; border-radius: 50px; border: 2px solid var(--border);
    background: white; cursor: pointer; font-size: 14px; font-weight: 600;
    color: var(--muted); transition: all 0.2s; }
  .tab.active { background: var(--primary); border-color: var(--primary); color: white; }
  .tab:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
  
  /* Section */
  .section { display: none; }
  .section.active { display: block; }
  
  /* Search bar */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 28px;
    background: white; padding: 12px 16px; border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .search-bar input, .search-bar select {
    flex: 1; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: 14px; outline: none; transition: border 0.2s;
  }
  .search-bar input:focus, .search-bar select:focus { border-color: var(--primary); }
  .search-bar select { flex: 0 0 200px; cursor: pointer; }
  .btn-search {
    padding: 10px 24px; background: var(--primary); color: white;
    border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
    font-size: 14px; transition: background 0.2s; white-space: nowrap;
  }
  .btn-search:hover { background: var(--primary-dark); }
  
  /* Brand grid */
  .brand-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }
  
  /* Brand card */
  .brand-card {
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid transparent;
    cursor: default;
  }
  .brand-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.12); }
  .brand-card .logo-wrap {
    width: 100px; height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-card .logo-wrap img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    loading: lazy;
  }
  .brand-card .logo-fallback {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; letter-spacing: -1px;
    border-radius: 8px;
  }
  .brand-card .brand-name {
    font-size: 15px; font-weight: 700; text-align: center;
  }
  .btn-download {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    color: white; text-decoration: none; transition: opacity 0.2s;
  }
  .btn-download:hover { opacity: 0.88; }
  
  /* SKU Results */
  .results-wrap { margin-top: 20px; }
  .results-info { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .result-card {
    background: white; border-radius: 10px; padding: 14px 18px;
    margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    border-left: 4px solid var(--primary);
  }
  .result-card .result-table { font-size: 11px; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .result-kv { display: flex; flex-wrap: wrap; gap: 8px 16px; }
  .result-kv .kv-pair { font-size: 12px; }
  .result-kv .kv-pair .k { color: var(--muted); }
  .result-kv .kv-pair .v { font-weight: 600; color: var(--text); }
  
  .no-results { text-align: center; padding: 48px; color: var(--muted); font-size: 15px; }
  .loading { text-align: center; padding: 32px; color: var(--muted); }
  
  /* Section headers */
  .section-title {
    font-size: 18px; font-weight: 700; color: var(--text);
    margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  .section-title span { font-size: 13px; font-weight: 400; color: var(--muted); }
  
  /* Category label */
  .category-label {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin: 28px 0 12px;
    padding-bottom: 6px; border-bottom: 2px solid var(--border);
  }
</style>

  <!-- BRANDS SECTION -->
  <div class="section active" id="tab-brands">
    <div id="brand-search-wrap" style="margin-bottom:20px;">
      <input type="text" id="brand-filter" placeholder="Search brands..." 
        oninput="filterBrands(this.value)"
        style="width:100%;max-width:400px;padding:10px 14px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:14px;outline:none;">
    </div>
    
    <div id="brand-grid" class="brand-grid"></div>
  </div>
  
  <!-- SKU SEARCH SECTION -->
  <div class="section" id="tab-sku">
    <div class="search-bar">
      <select id="sku-brand">
        <option value="">Select Brand...</option>
      </select>
      <input type="text" id="sku-query" placeholder="Enter SKU / Model ID / Product Name..." 
        onkeydown="if(event.key==='Enter') searchSKU()">
      <button class="btn-search" onclick="searchSKU()">Search</button>
    </div>
    <div id="sku-results"></div>

// ===================== RENDER BRANDS =====================
function renderBrands(filter = '') {
  const grid = document.getElementById('brand-grid');
  const lf = filter.toLowerCase();
  
  // Group by category
  const cats = {};
  BRANDS.forEach(b => {
    if (lf && !b.name.toLowerCase().includes(lf)) return;
    if (!cats[b.category]) cats[b.category] = [];
    cats[b.category].push(b);
  });
  
  let html = '';
  for (const [cat, brands] of Object.entries(cats)) {
    html += `<div class="category-label" style="grid-column:1/-1">${cat}</div>`;
    brands.sort((a,b)=>a.name.localeCompare(b.name)).forEach(b => {
      const logoHtml = b.logo
        ? `<img src="${BASE_URL}/${b.logo}" alt="${b.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const fallbackStyle = b.logo ? 'style="display:none"' : '';
      html += `
        <div class="brand-card" style="border-color:${b.color}20">
          <div class="logo-wrap">
            ${logoHtml}
            <div class="logo-fallback" ${fallbackStyle} style="background:${b.color}15;color:${b.color}">
              ${b.name.slice(0,2).toUpperCase()}
            </div>
          </div>
          <div class="brand-name" style="color:${b.color}">${b.name}</div>
          <a class="btn-download" style="background:${b.color}" 
            href="${BASE_URL}/${b.pdf}" target="_blank" download>
            ⬇ Download PDF
          </a>
        </div>`;
    });
  }
  
  if (!html) {
    html = '<div class="no-results" style="grid-column:1/-1">No brands match your search.</div>';
  }
  
  grid.innerHTML = html;
}

function filterBrands(val) {
  renderBrands(val);
}

// ===================== SKU SEARCH =====================
const skuSelect = document.getElementById('sku-brand');
// Populate brand dropdown - only brands with searchable JSON
BRANDS.forEach(b => {
  const opt = document.createElement('option');
  opt.value = b.key;
  opt.textContent = b.name;
  skuSelect.appendChild(opt);
});

const jsonCache = {};

async function loadBrandJSON(brandKey) {
  if (jsonCache[brandKey]) return jsonCache[brandKey];
  const url = `${BASE_URL}/${brandKey}_search.json`;
  document.getElementById('sku-results').innerHTML = '<div class="loading">Loading data...</div>';
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();
    jsonCache[brandKey] = data;
    return data;
  } catch (e) {
    return null;
  }
}

async function searchSKU() {
  const brandKey = document.getElementById('sku-brand').value;
  const query = document.getElementById('sku-query').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('sku-results');
  
  if (!brandKey) {
    resultsDiv.innerHTML = '<div class="no-results">Please select a brand first.</div>';
    return;
  }
  if (!query) {
    resultsDiv.innerHTML = '<div class="no-results">Please enter a search term.</div>';
    return;
  }
  
  const data = await loadBrandJSON(brandKey);
  if (!data) {
    resultsDiv.innerHTML = '<div class="no-results">Could not load data for this brand.</div>';
    return;
  }
  
  const terms = query.split(/\s+/).filter(Boolean);
  const matches = data.rows.filter(row => {
    const s = row.s.toLowerCase();
    return terms.every(t => s.includes(t));
  });
  
  if (!matches.length) {
    resultsDiv.innerHTML = `<div class="no-results">No results found for "<strong>${query}</strong>"</div>`;
    return;
  }
  
  // Show up to 200 results
  const show = matches.slice(0, 200);
  let html = `<div class="results-info">Found <strong>${matches.length}</strong> result${matches.length!==1?'s':''}${matches.length>200?' (showing first 200)':''}</div>`;
  
  show.forEach(row => {
    const headers = data.tables[row.t] || [];
    const kvPairs = headers.map((h, i) => {
      const v = row.v[i] || '';
      return v ? `<div class="kv-pair"><span class="k">${escHtml(h)}: </span><span class="v">${escHtml(v)}</span></div>` : '';
    }).join('');
    html += `
      <div class="result-card">
        <div class="result-table">${escHtml(row.t)}</div>
        <div class="result-kv">${kvPairs}</div>
      </div>`;
  });
  
  resultsDiv.innerHTML = html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===================== TABS =====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['brands','sku'][i]===tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
}
